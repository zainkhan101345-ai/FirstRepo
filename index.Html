<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Basic Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #444;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        nav a:hover {
            color: #00bcd4;
        }

        section {
            padding: 40px;
            text-align: center;
        }

        .hero {
            background: #f4f4f4;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        button {
            padding: 10px 20px;
            background: #00bcd4;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0097a7;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <section class="hero" id="home">
        <h2>Hello 👋</h2>
        <p>This is a simple website built with HTML and CSS.</p>
        <button>Learn More</button>
    </section>

    <section id="about">
        <h2>About Us</h2>
        <p>We are learning web development step by step. This is a beginner-friendly website layout.</p>
    </section>

    <section id="contact">
        <h2>Contact</h2>
        <p>Email: example@email.com</p>
    </section>

    <footer>
        <p>© 2026 My Basic Website | All Rights Reserved</p>
    </footer>

</body>
</html>
